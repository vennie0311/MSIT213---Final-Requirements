services:
  - type: web
    name: scholarship-application-portal
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn scholarship_portal.wsgi
    envVars:
      - key: DJANGO_SECRET_KEY
        value: "replace-me"
      - key: DEBUG
        value: "false"
      - key: CLOUDINARY_URL
        value: "replace-me"
      - key: DATABASE_URL
        value: "replace-me"
      - key: ALLOWED_HOSTS
        value: "msit213-final-requirements.onrender.com"
